<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PULS · ToolIconBar</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0B0E14;--s1:rgba(255,255,255,.04);--bd:rgba(255,255,255,.08);--tp:#F4F6FA;--tm:#8B93A7;--a:#8D2AF3;--p:'Montserrat',sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:var(--p);padding:40px 24px}.wrap{max-width:640px;margin:0 auto}.bar{display:flex;gap:10px;padding:14px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid var(--bd)}.btn{width:52px;height:44px;border-radius:10px;border:1px solid rgba(141,42,243,.18);background:rgba(255,255,255,.02);display:grid;place-items:center;color:var(--tm)}.btn.active{background:rgba(141,42,243,.12);color:var(--tp);border-color:rgba(141,42,243,.28)}</style></head><body><div class="wrap"><div class="bar"><div class="btn active">🎤</div><div class="btn">📹</div><div class="btn">🗂</div><div class="btn">▦</div><div class="btn">💬</div><div class="btn">✕</div></div></div></body></html>
