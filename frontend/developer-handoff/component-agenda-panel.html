<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PULS · AgendaPanel</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0B0E14;--s1:rgba(255,255,255,.04);--bd:rgba(255,255,255,.08);--tp:#F4F6FA;--ts:#B8C0D0;--tm:#8B93A7;--a:#8D2AF3;--p:'Montserrat',sans-serif;--m:'IBM Plex Mono',monospace}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--ts);font-family:var(--p);padding:40px 24px}.wrap{max-width:980px;margin:0 auto}.grid{display:grid;grid-template-columns:.8fr 1.2fr;gap:16px}.panel{padding:20px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid var(--bd)}.k{color:var(--tm);font:600 .68rem var(--m);letter-spacing:.16em;text-transform:uppercase;margin-bottom:14px}.list{display:grid;gap:12px}.item{display:flex;align-items:flex-start;gap:12px}.box{width:18px;height:18px;border-radius:4px;border:1.5px solid rgba(255,255,255,.18);margin-top:2px}.box.checked{background:var(--a);border-color:var(--a)}.ttl{color:var(--tp);font-size:.92rem;font-weight:600}.meta{color:var(--tm);font-size:.82rem;line-height:1.45}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="grid"><section class="panel"><div class="k">Agenda</div><div class="list"><div class="item"><div class="box checked"></div><div class="ttl">Ujasnit výstup schůzky</div></div><div class="item"><div class="box"></div><div class="ttl">Zapsat rozhodnutí</div></div><div class="item"><div class="box"></div><div class="ttl">Převést follow-upy do Planneru</div></div></div></section><section class="panel"><div class="k">Room info</div><div class="ttl">puls-claude-meet</div><div class="meta" style="margin-top:10px">Jitsi Videobridge · PULS controls · room status a pomocné informace k meeting shellu.</div></section></div></div></body></html>
