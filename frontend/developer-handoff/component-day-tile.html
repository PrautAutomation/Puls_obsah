<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PULS · DayTile</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0B0E14;--s1:rgba(255,255,255,.04);--s2:rgba(255,255,255,.06);--bd:rgba(255,255,255,.08);--tp:#F4F6FA;--ts:#B8C0D0;--tm:#8B93A7;--a:#8D2AF3;--p:'Montserrat',sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:var(--p);padding:40px 24px}.wrap{max-width:980px;margin:0 auto}.row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.tile{min-height:200px;padding:18px;border-radius:10px;background:var(--s1);border:1px solid var(--bd)}.tile.selected{background:linear-gradient(180deg,rgba(141,42,243,.1),transparent 70%),var(--s2);border-color:rgba(141,42,243,.28)}.d{display:flex;justify-content:space-between;color:var(--tm);font-size:.82rem}.t{color:var(--tp);font-size:1rem;font-weight:700;line-height:1.25;margin:18px 0 12px}.b{color:var(--ts);font-size:.82rem;line-height:1.55}.lock{margin-top:12px;color:var(--tm);font-size:.78rem}@media(max-width:900px){.row{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="row"><div class="tile selected"><div class="d"><span>Den 1</span><span>Lekce</span></div><div class="t">Začni: Orientace: Svět Claude a AI Fluency</div><div class="b">Začneš kapitolu Orientace a projdeš první úkoly dne.</div></div><div class="tile"><div class="d"><span>Den 2</span><span>Praktika</span></div><div class="t">Procvič: Orientace</div><div class="b">Krátká denní overview karta v roadmapě.</div><div class="lock">Zamčeno do dokončení předchozího dne</div></div><div class="tile"><div class="d"><span>Den 3</span><span>Cvičení</span></div><div class="t">Začni: Modely a plány</div><div class="b">Přehled dne v týdenním gridu.</div></div></div></div></body></html>
