<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PULS · ProgressDonutCard</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0B0E14;--s1:rgba(255,255,255,.04);--bd:rgba(255,255,255,.08);--tp:#F4F6FA;--ts:#B8C0D0;--tm:#8B93A7;--ok:#10B981;--warn:#EF4444;--m:'IBM Plex Mono',monospace;--p:'Montserrat',sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--ts);font-family:var(--p);padding:40px 24px}.wrap{max-width:420px;margin:0 auto}.card{padding:24px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid var(--bd)}.donut{width:160px;height:160px;margin:0 auto 18px;border-radius:50%;border:12px solid rgba(255,255,255,.09);display:grid;place-items:center;position:relative}.donut::after{content:"";position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;background:var(--ok)}.donut strong{color:var(--tp);font-size:2.2rem}.donut small{display:block;color:var(--tm);font-family:var(--m)}.row{display:flex;justify-content:center;gap:18px;color:var(--tm);font-size:.82rem;margin:12px 0}.foot{padding-top:14px;border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;color:var(--tm);font-size:.82rem}</style></head><body><div class="wrap"><div class="card"><div class="donut"><div style="text-align:center"><strong>0</strong><small>z 1110</small></div></div><div class="row"><span style="color:var(--ok)">0 splněno</span><span style="color:var(--warn)">0 promeskáno</span></div><div class="foot"><span>1110 bodů cíl</span><span>Den 1/56</span></div></div></div></body></html>
