<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULS · ChecklistPanel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B0E14;--s1:rgba(255,255,255,.04);--s2:rgba(255,255,255,.06);--bd:rgba(255,255,255,.08);--bds:rgba(255,255,255,.12);
  --tp:#F4F6FA;--ts:#B8C0D0;--tm:#A4ACBE;--ok:#10B981;--m:'IBM Plex Mono',monospace;--p:'Montserrat',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ts);font-family:var(--p);padding:40px 24px}
.wrap{max-width:720px;margin:0 auto}
.panel{padding:20px;border-radius:14px;background:var(--s1);border:1px solid var(--bd)}
.head{display:flex;justify-content:space-between;gap:12px;margin-bottom:12px}
.k{color:var(--tm);font:600 .68rem var(--m);letter-spacing:.16em;text-transform:uppercase}
.row{
  display:grid;grid-template-columns:20px minmax(0,1fr) auto;gap:14px;align-items:start;
  padding:14px 12px;border:1px solid transparent;border-radius:10px;cursor:pointer;
  transition:background .2s,border-color .2s,transform .2s;
}
.row:hover{background:var(--s2);border-color:var(--bds);transform:translateY(-1px)}
.row + .row{margin-top:6px}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.22);margin-top:4px}
.ttl{color:var(--tp);font-size:.95rem;font-weight:650;line-height:1.3}
.sub{color:var(--ts);font-size:.82rem;line-height:1.35;margin-top:2px}
.meta{color:var(--ok);font:700 .78rem var(--m)}
</style>
</head>
<body>
<div class="wrap">
  <section class="panel">
    <div class="head">
      <div class="k">ChecklistPanel</div>
      <div class="k">0 / 42</div>
    </div>

    <div class="row" tabindex="0">
      <div class="dot"></div>
      <div>
        <div class="ttl">Týdenní report s Claudem</div>
        <div class="sub">Claude Cowork, Excel, PowerPoint a Microsoft 365</div>
      </div>
      <div class="meta">+80 b</div>
    </div>

    <div class="row" tabindex="0">
      <div class="dot"></div>
      <div>
        <div class="ttl">Týdenní thinking výzva</div>
        <div class="sub">Extended Thinking</div>
      </div>
      <div class="meta">+60 b</div>
    </div>

    <div class="row" tabindex="0">
      <div class="dot"></div>
      <div>
        <div class="ttl">Každodenní chat s Claudem</div>
        <div class="sub">Ovládání chatu</div>
      </div>
      <div class="meta">+20 b</div>
    </div>
  </section>
</div>
</body>
</html>
