<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PULS · TopicScoreCard</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0B0E14;--s1:rgba(255,255,255,.04);--bd:rgba(255,255,255,.08);--tp:#F4F6FA;--tm:#8B93A7;--a:#8D2AF3;--p:'Montserrat',sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:var(--p);padding:40px 24px}.wrap{max-width:980px;margin:0 auto}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{padding:18px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--bd)}.row{display:flex;align-items:center;gap:12px}.icon{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,.04);display:grid;place-items:center;color:#fff}.t{color:var(--tp);font-size:1rem;font-weight:700;line-height:1.3}.s{color:var(--tm);font-size:.84rem;margin-top:16px}.pts{color:var(--a);font-size:2rem;font-weight:800;line-height:1.1}@media(max-width:900px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="grid"><div class="card"><div class="row"><div class="icon">✦</div><div class="t">Orientace: Svět Claude a AI Fluency</div></div><div class="s">Celkem získané body</div><div class="pts">40 b</div></div><div class="card"><div class="row"><div class="icon">✦</div><div class="t">Projects, Artifacts a Memory</div></div><div class="s">Celkem získané body</div><div class="pts">65 b</div></div></div></div></body></html>
