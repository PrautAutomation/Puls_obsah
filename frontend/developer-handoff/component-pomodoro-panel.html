<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PULS · PomodoroPanel</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0B0E14;--s1:rgba(255,255,255,.04);--bd:rgba(255,255,255,.08);--tp:#F4F6FA;--tm:#8B93A7;--a:#8D2AF3;--p:'Montserrat',sans-serif;--m:'IBM Plex Mono',monospace}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:var(--p);padding:40px 24px}.wrap{max-width:520px;margin:0 auto}.panel{padding:22px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid var(--bd)}.k{color:var(--tm);font:600 .68rem var(--m);letter-spacing:.16em;text-transform:uppercase}.time{color:var(--tp);font:800 3rem var(--m);line-height:1;margin:16px 0 10px}.sub{color:var(--tm);font-size:.84rem}.actions{display:flex;gap:12px;margin-top:22px}.btn{padding:14px 22px;border-radius:12px;font-weight:700;border:1px solid var(--bd)}.btn.primary{background:linear-gradient(180deg,#ad44ff,#8721f5);color:#fff;border-color:transparent}.btn.secondary{background:rgba(255,255,255,.04);color:var(--tp)}</style></head><body><div class="wrap"><div class="panel"><div class="k">Pomodoro</div><div class="time">25:00</div><div class="sub">25 minut pro dnešní lekci</div><div class="actions"><button class="btn primary">Zapnout</button><button class="btn secondary">Reset</button></div></div></div></body></html>
