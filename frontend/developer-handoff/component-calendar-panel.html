<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PULS · CalendarPanel</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0B0E14;--s1:rgba(255,255,255,.04);--s2:rgba(255,255,255,.06);--bd:rgba(255,255,255,.08);--tp:#F4F6FA;--ts:#B8C0D0;--tm:#8B93A7;--a:#8D2AF3;--warn:#F59E0B;--err:#EF4444;--p:'Montserrat',sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--ts);font-family:var(--p);padding:40px 24px}.wrap{max-width:420px;margin:0 auto}.panel{padding:20px;border-radius:14px;background:var(--s1);border:1px solid var(--bd)}.h{color:var(--tp);font-size:1rem;font-weight:700;margin-bottom:14px}.days{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;margin-bottom:14px}.day{padding:12px 0;text-align:center;border-radius:10px;background:rgba(255,255,255,.03);color:var(--ts);position:relative}.day.active{outline:1px solid rgba(141,42,243,.32)}.day::after{content:"";position:absolute;left:50%;bottom:8px;transform:translateX(-50%);width:8px;height:8px;border-radius:50%;background:var(--err)}.day.warn::after{background:var(--warn)}.list{display:grid;gap:10px}.item{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}.item:last-child{border-bottom:0}</style></head><body><div class="wrap"><section class="panel"><div class="h">Kalendář</div><div class="days"><div class="day">8</div><div class="day">9</div><div class="day">10</div><div class="day">11</div><div class="day active">12</div><div class="day">13</div><div class="day warn">14</div></div><div class="list"><div class="item"><span>AI Fluency certifikát</span><span>200 b</span></div><div class="item"><span>Claude 101 – certifikát</span><span>150 b</span></div><div class="item"><span>Osobní manifest Proč Claude</span><span>75 b</span></div></div></section></div></body></html>
