<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PULS · QuestRow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --color-canvas:#0B0E14;
  --color-surface-1:rgba(255,255,255,0.04);
  --color-surface-2:rgba(255,255,255,0.06);
  --color-border-soft:rgba(255,255,255,0.08);
  --color-border-strong:rgba(255,255,255,0.12);
  --color-text-primary:#F4F6FA;
  --color-text-secondary:#B8C0D0;
  --color-text-muted:#8B93A7;
  --color-accent:#8D2AF3;
  --color-success:#10B981;
  --color-success-bg:rgba(16,185,129,0.08);
  --color-success-border:rgba(52,211,153,0.34);
  --font-primary:'Montserrat',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'IBM Plex Mono','Fira Code',monospace;
  --space-2:8px;
  --space-3:12px;
  --space-4:16px;
  --space-5:20px;
  --space-6:24px;
  --space-8:32px;
  --space-10:40px;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:14px;
  --ease-standard:cubic-bezier(0.4,0,0.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:var(--color-canvas);
  color:var(--color-text-secondary);
  font-family:var(--font-primary);
  padding:var(--space-10) var(--space-6);
}
.wrap{max-width:760px;margin:0 auto}
.showcase-title{
  color:var(--color-text-primary);
  font-size:clamp(1.2rem,2.2vw,1.65rem);
  font-weight:750;
  margin-bottom:6px;
}
.showcase-sub{
  max-width:64ch;
  color:var(--color-text-muted);
  font-size:0.84rem;
  margin-bottom:var(--space-8);
  line-height:1.55;
}
.hint{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-bottom:var(--space-5);
  color:var(--color-text-muted);
  font-family:var(--font-mono);
  font-size:0.66rem;
  letter-spacing:0.14em;
  text-transform:uppercase;
}
.hint .dot{width:6px;height:6px;border-radius:50%;background:var(--color-accent)}
.ui-surface-panel{
  background:var(--color-surface-1);
  border:1px solid var(--color-border-soft);
  border-radius:var(--radius-lg);
}
.ui-xp-pill{
  display:inline-flex;
  align-items:center;
  padding:3px 8px;
  border-radius:var(--radius-sm);
  color:rgba(16,185,129,0.78);
  background:rgba(16,185,129,0.04);
  border:1px solid rgba(52,211,153,0.18);
  font-family:var(--font-mono);
  font-size:0.72rem;
  font-weight:700;
  white-space:nowrap;
}
.ui-meta-label{
  color:var(--color-text-muted);
  font-family:var(--font-mono);
  font-size:0.68rem;
  letter-spacing:0.16em;
  text-transform:uppercase;
}
.quest-panel{padding:var(--space-5)}
.quest-panel__header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:var(--space-3);
  margin-bottom:var(--space-4);
}
.quest-panel__label{
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.quest-panel__label .dot{width:6px;height:6px;border-radius:50%;background:var(--color-accent)}
.quest-list{display:grid;gap:6px}
.quest-row{
  display:grid;
  grid-template-columns:18px minmax(0,1fr) auto;
  gap:var(--space-3);
  align-items:center;
  padding:10px var(--space-3);
  border:1px solid transparent;
  border-radius:var(--radius-sm);
  cursor:pointer;
  transition:background 0.2s var(--ease-standard),border-color 0.2s var(--ease-standard);
}
.quest-row:hover{background:var(--color-surface-1)}
.quest-row.is-done{
  background:var(--color-success-bg);
  border-color:rgba(52,211,153,0.2);
}
.quest-row.is-done .ui-xp-pill{
  color:var(--color-success);
  background:var(--color-success-bg);
  border-color:var(--color-success-border);
}
.quest-row input{
  appearance:none;
  width:18px;
  height:18px;
  border:1.5px solid var(--color-border-strong);
  border-radius:4px;
  background:transparent;
  position:relative;
  cursor:pointer;
  transition:background 0.15s var(--ease-standard),border-color 0.15s var(--ease-standard);
}
.quest-row input:checked{
  background:var(--color-success);
  border-color:var(--color-success);
}
.quest-row input:checked::after{
  content:"✓";
  position:absolute;
  inset:0;
  display:grid;
  place-items:center;
  color:#052e1d;
  font-size:12px;
  font-weight:800;
}
.quest-row input:focus-visible{
  outline:2px solid rgba(141,42,243,0.42);
  outline-offset:2px;
}
.quest-row__title{
  color:var(--color-text-primary);
  font-size:0.84rem;
  font-weight:600;
  line-height:1.35;
}
.state-grid{
  display:grid;
  gap:var(--space-5);
  margin-top:var(--space-8);
}
.state-tag{
  display:block;
  margin-bottom:var(--space-2);
  color:var(--color-text-muted);
  font-family:var(--font-mono);
  font-size:0.62rem;
  letter-spacing:0.16em;
  text-transform:uppercase;
}
</style>
</head>
<body>
<div class="wrap">
  <h1 class="showcase-title">QuestRow</h1>
  <p class="showcase-sub">
    Sidebar checklist položka: checkbox, název a XP. Hotový stav má být čitelně odměňující, ale ne příliš hlasitý.
    Zelená zůstává jen jako lehký tint a v XP pillu.
  </p>

  <div class="hint"><span class="dot"></span>Klikni na řádky a sleduj rozdíl mezi klidným a hotovým stavem</div>

  <section class="quest-panel ui-surface-panel">
    <div class="quest-panel__header">
      <span class="quest-panel__label ui-meta-label"><span class="dot"></span>Questy dne</span>
      <span class="ui-meta-label" id="counter">2 / 5</span>
    </div>
    <div class="quest-list" id="questList">
      <label class="quest-row is-done">
        <input type="checkbox" checked>
        <span class="quest-row__title">Zadat první reálný úkol</span>
        <span class="ui-xp-pill">+40 b</span>
      </label>
      <label class="quest-row">
        <input type="checkbox">
        <span class="quest-row__title">Přečíst příručku</span>
        <span class="ui-xp-pill">+30 b</span>
      </label>
      <label class="quest-row is-done">
        <input type="checkbox" checked>
        <span class="quest-row__title">Napsat manifest „Proč Claude“</span>
        <span class="ui-xp-pill">+60 b</span>
      </label>
      <label class="quest-row">
        <input type="checkbox">
        <span class="quest-row__title">Dokončit situaci od A do Z</span>
        <span class="ui-xp-pill">+50 b</span>
      </label>
    </div>
  </section>

  <div class="state-grid">
    <div>
      <span class="state-tag">Stav · nesplněno</span>
      <label class="quest-row">
        <input type="checkbox">
        <span class="quest-row__title">Přečíst příručku</span>
        <span class="ui-xp-pill">+30 b</span>
      </label>
    </div>
    <div>
      <span class="state-tag">Stav · splněno</span>
      <label class="quest-row is-done">
        <input type="checkbox" checked>
        <span class="quest-row__title">Napsat manifest „Proč Claude“</span>
        <span class="ui-xp-pill">+60 b</span>
      </label>
    </div>
  </div>
</div>
<script>
const list=document.getElementById('questList');
const counter=document.getElementById('counter');
function refreshCounter(){
  const total=list.querySelectorAll('.quest-row').length;
  const done=list.querySelectorAll('input:checked').length;
  counter.textContent=`${done} / ${total}`;
}
list.querySelectorAll('.quest-row').forEach((row)=>{
  const input=row.querySelector('input');
  input.addEventListener('change',()=>{
    row.classList.toggle('is-done',input.checked);
    refreshCounter();
  });
});
refreshCounter();
</script>
</body>
</html>
