<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PULS · InfoMetricCard</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0B0E14;--s1:rgba(255,255,255,.04);--bd:rgba(255,255,255,.08);--tp:#F4F6FA;--tm:#8B93A7;--a:#8D2AF3;--p:'Montserrat',sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);font-family:var(--p);padding:40px 24px}.wrap{max-width:1180px;margin:0 auto}.row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.card{padding:18px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--bd)}small{display:block;color:var(--a);font-size:.8rem;margin-bottom:10px}strong{display:block;color:var(--tp);font-size:1rem}@media(max-width:900px){.row{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="row"><div class="card"><small>Délka</small><strong>14 dní</strong></div><div class="card"><small>Tempo</small><strong>1 úkol denně</strong></div><div class="card"><small>Milník</small><strong>Den 14</strong></div><div class="card"><small>Splněno</small><strong>0/14 · 0 %</strong></div></div></div></body></html>
