<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PULS · SectionShell</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0B0E14;--s1:rgba(255,255,255,.04);--bd:rgba(255,255,255,.08);--tp:#F4F6FA;--ts:#B8C0D0;--tm:#8B93A7;--m:'IBM Plex Mono',monospace;--p:'Montserrat',sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--ts);font-family:var(--p);padding:40px 24px}.wrap{max-width:1180px;margin:0 auto}.shell{border:1px solid var(--bd);background:var(--s1);border-radius:14px;padding:22px}.head{padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.06);margin-bottom:18px}.label{color:var(--tm);font:600 .68rem var(--m);letter-spacing:.16em;text-transform:uppercase}.title{color:var(--tp);font-size:1.18rem;font-weight:700;margin-top:8px}.body{display:grid;grid-template-columns:1.4fr .8fr;gap:16px}.panel{border:1px solid var(--bd);border-radius:10px;padding:16px;background:rgba(255,255,255,.03)}@media(max-width:900px){.body{grid-template-columns:1fr}}</style></head><body><div class="wrap"><section class="shell"><div class="head"><div class="label">SectionShell</div><div class="title">Foundation: základy Claude a AI fluency</div></div><div class="body"><div class="panel">Primary content area</div><div class="panel">Supporting panel area</div></div></section></div></body></html>
