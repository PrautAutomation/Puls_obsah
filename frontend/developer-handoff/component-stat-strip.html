<!DOCTYPE html><html lang="cs"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>PULS · StatStrip</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"><style>:root{--bg:#0B0E14;--s1:rgba(255,255,255,.04);--bd:rgba(255,255,255,.08);--tp:#F4F6FA;--ts:#B8C0D0;--tm:#8B93A7;--p:'Montserrat',sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--ts);font-family:var(--p);padding:40px 24px}.wrap{max-width:1180px;margin:0 auto}.strip{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;padding:22px;border-radius:14px;background:var(--s1);border:1px solid var(--bd)}.item small{display:block;color:var(--tm);font-size:.76rem;margin-bottom:8px}.item strong{display:block;color:var(--tp);font-size:1.12rem}.bar{height:6px;border-radius:999px;background:rgba(255,255,255,.05);margin-top:10px;overflow:hidden}.fill{height:100%;width:24%;background:rgba(141,42,243,.85)}@media(max-width:900px){.strip{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="strip"><div class="item"><small>Kurz</small><strong>Den 1/56</strong><div class="bar"><div class="fill"></div></div></div><div class="item"><small>Splněno</small><strong>0 %</strong><div class="bar"><div class="fill" style="width:0%"></div></div></div><div class="item"><small>Dny</small><strong>0/56</strong><div class="bar"><div class="fill" style="width:0%"></div></div></div><div class="item"><small>Body</small><strong>0 / 4820</strong><div class="bar"><div class="fill" style="width:0%"></div></div></div></div></div></body></html>
